name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            libffi-dev libssl-dev \
            python3-dev build-essential \
            zlib1g-dev libncurses5-dev \
            libncursesw5-dev cmake ninja-build
          pip install buildozer cython

      - name: Build APK
        working-directory: apk
        run: |
          # Let buildozer download SDK first, then accept licenses
          buildozer android debug 2>&1 | tee /tmp/build.log || true
          
          # Accept all licenses
          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
          if [ -f "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" ]; then
            yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses
          elif [ -f "$SDK_DIR/tools/bin/sdkmanager" ]; then
            yes | $SDK_DIR/tools/bin/sdkmanager --licenses
          fi
          
          # Retry build
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Multporn-Downloader-APK
          path: apk/bin/*.apk
